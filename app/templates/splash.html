<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEARTGAURD - AI Heart Monitoring</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="splash-container splash-dark-theme">
        <!-- Dark Animated Background Gradients -->
        <div class="splash-bg-layer bg-1"></div>
        <div class="splash-bg-layer bg-2"></div>
        <div class="splash-bg-layer bg-3"></div>
        
        <!-- Medical Grid Background -->
        <div class="splash-grid splash-grid-dark"></div>
        
        <!-- Animated Floating Anatomy Background -->
        <div class="splash-circles splash-dark-circles">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
        
        <!-- Main Content -->
        <div class="splash-content">
            <!-- Video Container -->
            <div class="video-container">
                <video class="splash-video" autoplay muted loop playsinline>
                    <source src="{{ url_for('static', filename='videos/heart_animation.mp4') }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <!-- Overlay Glow Effect -->
                <div class="video-overlay"></div>
            </div>
            
            <!-- Title and Subtitle -->
            <h1 class="splash-title splash-title-dark" data-i18n="splash_title">HEARTGAURD</h1>
            <p class="splash-subtitle splash-subtitle-dark" data-i18n="splash_subtitle">AI-Powered Cardiac Intelligence Platform</p>
            
            <!-- Loading Indicator -->
            <div class="loading-dots loading-dots-dark">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/language.js') }}"></script>
    <script src="{{ url_for('static', filename='js/splash.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
</body>
</html>
