<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - Heart Guard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .add-user-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }
        .add-user-card {
            background: var(--gradient-card);
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(0,217,255,0.15), 0 0 80px rgba(255,46,99,0.08);
            padding: 40px 32px;
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .add-user-title {
            font-size: 2rem;
            color: var(--accent-glow);
            margin-bottom: 16px;
        }
        .add-user-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .add-user-form label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .add-user-form input, .add-user-form select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-light);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }
        .add-user-form input:focus, .add-user-form select:focus {
            outline: none;
            border-color: var(--accent-glow);
        }
        .add-user-btn {
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .add-user-btn:hover {
            background: var(--gradient-accent);
        }
        .flashes {
            margin-bottom: 16px;
            width: 100%;
            list-style: none;
            padding: 0;
        }
        .flashes li {
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 1rem;
        }
        .flashes .success {
            background: var(--success);
            color: #fff;
        }
        .flashes .error {
            background: var(--danger);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="add-user-container">
        <div class="add-user-card">
            <div class="add-user-title">Add New User</div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="flashes">
                    {% for category, message in messages %}
                        <li class="{{ category }}">{{ message }}</li>
                    {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}
            <form class="add-user-form" method="POST" action="/add-user">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="doctor">Doctor</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="add-user-btn" type="submit">Add User</button>
                {% if session['role'] == 'admin' %}
                <a href="/add-user?role=doctor" class="add-user-btn" style="margin-top:12px;text-align:center;display:block;">Add Doctor</a>
                {% endif %}
            </form>
        </div>
    </div>
</body>
</html>
