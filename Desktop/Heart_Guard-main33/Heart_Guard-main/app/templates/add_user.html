<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - Heart Guard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .app-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 var(--spacing-lg);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-bar-right {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
        }
        .theme-toggle, .language-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.3rem;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .theme-toggle:hover, .language-toggle:hover {
            background: rgba(0, 217, 255, 0.1);
            color: var(--accent-glow);
        }
        .add-user-container {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }
        .add-user-card {
            background: var(--gradient-card);
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(0,217,255,0.15), 0 0 80px rgba(255,46,99,0.08);
            padding: 40px 32px;
            width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .add-user-title {
            font-size: 2rem;
            color: var(--accent-glow);
            margin-bottom: 16px;
        }
        .add-user-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .add-user-form label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .add-user-form input, .add-user-form select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-light);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }
        .add-user-form input:focus, .add-user-form select:focus {
            outline: none;
            border-color: var(--accent-glow);
        }
        .add-user-btn {
            background: var(--gradient-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .add-user-btn:hover {
            background: var(--gradient-accent);
        }
        .flashes {
            margin-bottom: 16px;
            width: 100%;
            list-style: none;
            padding: 0;
        }
        .flashes li {
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 1rem;
        }
        .flashes .success {
            background: var(--success);
            color: #fff;
        }
        .flashes .error {
            background: var(--danger);
            color: #fff;
        }
    </style>
</head>
<body class="theme-dark">
    <!-- App Bar -->
    <nav class="app-bar">
        <div class="app-bar-left">
            <h1 class="page-title">Add User</h1>
        </div>
        <div class="app-bar-right">
            <button class="theme-toggle" title="Toggle Theme" data-i18n-title="toggle_theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
            <button class="language-toggle" title="Toggle Language" data-i18n-title="toggle_language">ع</button>
        </div>
    </nav>

    <div class="add-user-container">
        <div class="add-user-card">
            <div class="add-user-title">Add New User</div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="flashes">
                    {% for category, message in messages %}
                        <li class="{{ category }}">{{ message }}</li>
                    {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}
            <form class="add-user-form" method="POST" action="/add-user">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="doctor">Doctor</option>
                    <option value="admin">Admin</option>
                </select>
                <button class="add-user-btn" type="submit">Add User</button>
                {% if session['role'] == 'admin' %}
                <a href="/add-user?role=doctor" class="add-user-btn" style="margin-top:12px;text-align:center;display:block;">Add Doctor</a>
                {% endif %}
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/animations.js') }}"></script>
</body>
</html>
